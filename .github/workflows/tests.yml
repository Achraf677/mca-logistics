name: E2E Tests (Playwright)

# Tests Playwright — parcours critiques admin et mobile.
#
# Declencheurs :
#   - Pull Requests vers main : verification systematique avant merge
#   - Cron quotidien 06:00 UTC : watchdog production — si un parcours
#     critique casse en prod, on est notifie le matin (avant les chauffeurs).
#   - Workflow dispatch : declenchement manuel depuis l'UI GitHub.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 CEST (avant ouverture)
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL de base a tester (laisser vide pour la prod preview branche)'
        required: false
        default: ''

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 'cache: npm' desactive : exige un package-lock.json qui n'existe pas
          # encore dans ce repo. A reactiver une fois `npm install` lance localement
          # et package-lock.json commite.

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        env:
          # Si les secrets sont fournis, les tests authentifies tournent.
          # Sinon les tests font test.skip() proprement (cf. helpers/auth.js).
          ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          CHAUFFEUR_EMAIL: ${{ secrets.PLAYWRIGHT_CHAUFFEUR_EMAIL }}
          CHAUFFEUR_PASSWORD: ${{ secrets.PLAYWRIGHT_CHAUFFEUR_PASSWORD }}
          BASE_URL: ${{ github.event.inputs.base_url || '' }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
