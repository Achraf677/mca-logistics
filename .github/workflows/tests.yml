name: E2E Tests (Playwright)

# Tests Playwright — parcours critiques admin et mobile.
#
# Declencheurs :
#   - Workflow dispatch UNIQUEMENT (declenchement manuel depuis l'UI GitHub).
#
# Le trigger 'pull_request' a ete desactive le 2026-05-04 : les tests
# necessitent des credentials test (PLAYWRIGHT_ADMIN_EMAIL/PASSWORD) qui
# n'ont pas encore ete configures dans GitHub Secrets, donc echouent
# systematiquement et envoient un email a chaque push. A reactiver une
# fois les credentials presents (decommenter les 2 lignes 'pull_request'
# ci-dessous).
#
# Pas de cron : on n'a pas besoin de bruit quotidien.

on:
  # pull_request:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL de base a tester (laisser vide pour la prod preview branche)'
        required: false
        default: ''

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        env:
          # Si les secrets sont fournis, les tests authentifies tournent.
          # Sinon les tests font test.skip() proprement (cf. helpers/auth.js).
          ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          CHAUFFEUR_EMAIL: ${{ secrets.PLAYWRIGHT_CHAUFFEUR_EMAIL }}
          CHAUFFEUR_PASSWORD: ${{ secrets.PLAYWRIGHT_CHAUFFEUR_PASSWORD }}
          BASE_URL: ${{ github.event.inputs.base_url || '' }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
