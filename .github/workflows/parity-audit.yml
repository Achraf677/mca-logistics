name: Parite PC <-> mobile

on:
  pull_request:
    branches: [main]
  schedule:
    # Cron quotidien : 06:30 UTC = 07:30/08:30 Paris
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Audit statique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run parity audit
        id: audit
        run: |
          node tools/parity-audit.js > parity-report.md
          # Aussi en JSON pour eventuels traitements ulterieurs
          node tools/parity-audit.js --json > parity-report.json

      - name: Job summary
        run: cat parity-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-audit-${{ github.run_id }}
          path: |
            parity-report.md
            parity-report.json
          retention-days: 30

      # Sur PR : commente (idempotent : on remplace le commentaire precedent du bot)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '<!-- parity-audit-bot -->\n' + fs.readFileSync('parity-report.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            // Cherche un commentaire existant du bot
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith('<!-- parity-audit-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
