name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify JS syntax (all *.js at root)
        run: |
          set -e
          for f in *.js; do
            if [ -f "$f" ] && [ "$f" != "chart.min.js" ]; then
              echo "Checking $f..."
              node -c "$f"
            fi
          done

      - name: Run business rules tests
        run: node --test tests/business-rules.test.js tests/financial-regressions.test.js

  lint:
    name: ESLint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install --no-save eslint@^8.57.0 || true

      - name: Run ESLint (informational only)
        # eslint affiche les warnings mais le job reste vert (les warnings
        # sont remontes pour info, pas bloquants). Activera 'fail on error'
        # quand le code sera 100% lint clean.
        run: |
          if [ -d node_modules/eslint ]; then
            npx eslint script.js script-*.js *-supabase-adapter.js storage-uploader.js entity-supabase-adapter.js repo.js monitoring.js lazy-loader.js lazy-stubs.js auth-2fa.js all-entity-adapters.js watchdog.js 2>&1 | head -100 || true
          else
            echo "ESLint non installe - skipping"
          fi
        continue-on-error: true
