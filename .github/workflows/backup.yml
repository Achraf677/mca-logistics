name: Daily Supabase Backup

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: mca-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Dump + encrypt + upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (pg_dump 16, gpg, awscli, jq)
        run: |
          set -e
          # Postgres 16 client (Supabase runs PG 15+, use matching client)
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-16 gnupg jq curl awscli
          pg_dump --version
          gpg --version | head -1
          aws --version

      - name: Make scripts executable
        run: chmod +x infra/backup/run-backup.sh

      - name: Run backup
        env:
          SUPABASE_DB_URL:           ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF:      ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:             ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:             ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:                 ${{ secrets.R2_BUCKET }}
          BACKUP_GPG_RECIPIENT:      ${{ secrets.BACKUP_GPG_RECIPIENT }}
          BACKUP_GPG_PUBLIC_KEY:     ${{ secrets.BACKUP_GPG_PUBLIC_KEY }}
          BACKUP_LOG_DIR:            ${{ github.workspace }}/_logs
        run: |
          mkdir -p "${{ github.workspace }}/_logs"
          ./infra/backup/run-backup.sh

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-log-${{ github.run_id }}
          path: _logs/
          retention-days: 30
