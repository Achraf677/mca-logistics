<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:var(--font-body)}.shadows{display:flex;gap:18px}.box{width:120px;height:90px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}.s-sm{box-shadow:0 1px 2px rgba(0,0,0,0.18)}.s-md{box-shadow:0 6px 18px rgba(0,0,0,0.32)}.s-lg{box-shadow:0 18px 40px rgba(0,0,0,0.42)}.s-xl{box-shadow:0 28px 80px rgba(0,0,0,0.55)}.s-brand{box-shadow:0 18px 38px rgba(230,57,70,0.32)}</style></head><body><div class="shadows"><div class="box s-sm">sm</div><div class="box s-md">md</div><div class="box s-lg">lg</div><div class="box s-xl">xl</div><div class="box s-brand">brand</div></div></body></html>
