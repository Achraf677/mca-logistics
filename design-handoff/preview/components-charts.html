<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../chart.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:18px;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border-strong)}
.card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.card h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.stat-val{font-size:18px;font-weight:800;letter-spacing:-.03em;transition:color .2s}
.stat-sub{font-size:10px;color:var(--text-muted);margin-bottom:10px;min-height:14px}
.stat-sub .up{color:#06d6a0;font-weight:600}
.stat-sub .dn{color:var(--brand);font-weight:600}
</style>
</head>
<body>
<div class="grid">

  <div class="card">
    <div class="card-top">
      <h4>CA mensuel</h4>
      <span class="stat-val" id="val-bar">38 240 €</span>
    </div>
    <div class="stat-sub" id="sub-bar"><span class="up">↑ 12,4%</span> vs avril 2026</div>
    <canvas id="c-bar" height="110"></canvas>
  </div>

  <div class="card">
    <div class="card-top">
      <h4>Livraisons / semaine</h4>
      <span class="stat-val" id="val-line">247</span>
    </div>
    <div class="stat-sub" id="sub-line">Semaine en cours</div>
    <canvas id="c-line" height="110"></canvas>
  </div>

  <div class="card">
    <div class="card-top">
      <h4>Répartition charges</h4>
      <span class="stat-val" id="val-doughnut">14 820 €</span>
    </div>
    <div class="stat-sub" id="sub-doughnut">Total mai 2026</div>
    <canvas id="c-doughnut" height="110"></canvas>
  </div>

</div>

<script>
const BRAND='#e63946', GRID='rgba(255,255,255,.05)', TICK={color:'#adb5bd',font:{size:10}};

// ── BAR ── CA mensuel
const barLabels=['Nov','Déc','Jan','Fév','Mar','Avr','Mai'];
const barData=[28640,21980,31450,27310,35820,34040,38240];
const barColors=barData.map((_,i)=>i===barData.length-1?BRAND:'rgba(230,57,70,.4)');

const barChart=new Chart(document.getElementById('c-bar'),{
  type:'bar',
  data:{
    labels:barLabels,
    datasets:[{data:barData,backgroundColor:barColors,borderRadius:4,borderSkipped:false,hoverBackgroundColor:BRAND}]
  },
  options:{
    responsive:true,
    animation:{duration:600},
    plugins:{
      legend:{display:false},
      tooltip:{
        callbacks:{
          title:ctx=>barLabels[ctx[0].dataIndex]+' 2026',
          label:ctx=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(ctx.raw)
        },
        backgroundColor:'#2a2f37',borderColor:'#3a4150',borderWidth:1,
        titleColor:'#adb5bd',bodyColor:'#f1f3f5',padding:10,cornerRadius:8
      }
    },
    scales:{
      x:{grid:{color:GRID},ticks:TICK},
      y:{grid:{color:GRID},ticks:{...TICK,callback:v=>v>=1000?(v/1000)+'k':v},beginAtZero:true}
    },
    onHover:(_,els)=>{
      if(els.length){
        const i=els[0].index;
        const v=barData[i];
        const prev=i>0?barData[i-1]:null;
        document.getElementById('val-bar').textContent=new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
        if(prev){const pct=((v-prev)/prev*100).toFixed(1);const up=v>=prev;document.getElementById('sub-bar').innerHTML=`<span class="${up?'up':'dn'}">${up?'↑':'↓'} ${Math.abs(pct)}%</span> vs ${barLabels[i-1]}`}
        else document.getElementById('sub-bar').textContent=barLabels[i]+' 2026';
      } else {
        document.getElementById('val-bar').textContent='38 240 €';
        document.getElementById('sub-bar').innerHTML='<span class="up">↑ 12,4%</span> vs avril 2026';
      }
    }
  }
});

// ── LINE ── Livraisons / semaine
const lineLabels=['S18','S19','S20','S21','S22','S23','S24'];
const lineData=[42,47,39,52,48,55,50];

new Chart(document.getElementById('c-line'),{
  type:'line',
  data:{
    labels:lineLabels,
    datasets:[{
      data:lineData,
      borderColor:BRAND,
      backgroundColor:'rgba(230,57,70,.1)',
      fill:true,tension:.35,
      pointBackgroundColor:BRAND,pointRadius:3,pointHoverRadius:6,
      pointHoverBackgroundColor:'#fff',pointHoverBorderColor:BRAND,pointHoverBorderWidth:2
    }]
  },
  options:{
    responsive:true,animation:{duration:600},
    plugins:{
      legend:{display:false},
      tooltip:{
        callbacks:{
          title:ctx=>'Semaine '+lineLabels[ctx[0].dataIndex],
          label:ctx=>ctx.raw+' livraisons'
        },
        backgroundColor:'#2a2f37',borderColor:'#3a4150',borderWidth:1,
        titleColor:'#adb5bd',bodyColor:'#f1f3f5',padding:10,cornerRadius:8
      }
    },
    scales:{
      x:{grid:{color:GRID},ticks:TICK},
      y:{grid:{color:GRID},ticks:TICK,beginAtZero:true}
    },
    onHover:(_,els)=>{
      if(els.length){
        const i=els[0].index;
        document.getElementById('val-line').textContent=lineData[i];
        document.getElementById('sub-line').textContent='Semaine '+lineLabels[i];
      } else {
        document.getElementById('val-line').textContent='247';
        document.getElementById('sub-line').textContent='Semaine en cours';
      }
    }
  }
});

// ── DOUGHNUT ── Répartition charges
const dLabels=['Carburant','Entretien','Péages','Salaires','Autres'];
const dData=[4150,2370,1340,5630,1330];
const dColors=['#e63946','#ff6b35','#ffd60a','#4cc9f0','#6c757d'];
const total=dData.reduce((a,b)=>a+b,0);

new Chart(document.getElementById('c-doughnut'),{
  type:'doughnut',
  data:{labels:dLabels,datasets:[{data:dData,backgroundColor:dColors,borderWidth:0,hoverOffset:6}]},
  options:{
    responsive:true,cutout:'62%',animation:{duration:600},
    plugins:{
      legend:{display:true,position:'right',labels:{color:'#adb5bd',font:{size:10},boxWidth:10,padding:5}},
      tooltip:{
        callbacks:{
          label:ctx=>{
            const v=ctx.raw;
            const pct=(v/total*100).toFixed(1);
            return `${new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v)} (${pct}%)`;
          }
        },
        backgroundColor:'#2a2f37',borderColor:'#3a4150',borderWidth:1,
        titleColor:'#adb5bd',bodyColor:'#f1f3f5',padding:10,cornerRadius:8
      }
    },
    onHover:(_,els)=>{
      if(els.length){
        const i=els[0].index;
        const v=dData[i];const pct=(v/total*100).toFixed(0);
        document.getElementById('val-doughnut').textContent=new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
        document.getElementById('sub-doughnut').textContent=dLabels[i]+' — '+pct+'% du total';
      } else {
        document.getElementById('val-doughnut').textContent='14 820 €';
        document.getElementById('sub-doughnut').textContent='Total mai 2026';
      }
    }
  }
});
</script>
</body>
</html>
