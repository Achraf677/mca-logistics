<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:var(--font-body)}.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}.btn{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;min-height:40px;letter-spacing:0.02em}.btn-primary{background:var(--brand);color:#fff;box-shadow:var(--shadow-brand)}.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border-strong)}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid transparent}</style></head><body><div class="row"><button class="btn btn-primary">+ Nouvelle livraison</button><button class="btn btn-secondary">Exporter</button><button class="btn btn-danger">Signaler retard</button><button class="btn btn-ghost">Annuler</button></div></body></html>
