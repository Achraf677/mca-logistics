<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:var(--font-body)}.field{margin-bottom:14px}label{display:block;margin-bottom:7px;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);font-weight:700}input{width:280px;padding:14px 15px;border-radius:14px;border:1px solid rgba(173,181,189,0.16);background:rgba(4,9,17,0.7);color:var(--text);font-size:14px;font-family:inherit}input:focus{outline:none;border-color:rgba(230,57,70,0.65);box-shadow:0 0 0 4px rgba(230,57,70,0.10)}</style></head><body><div class="field"><label for="a">Identifiant</label><input id="a" placeholder="Identifiant admin ou numéro salarié"></div><div class="field"><label for="b">Mot de passe</label><input id="b" type="password" placeholder="Votre mot de passe"></div></body></html>
