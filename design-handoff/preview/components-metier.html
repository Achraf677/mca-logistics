<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 24px;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:13px}

.section{margin-bottom:32px}
.section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* Carte trajet */
.route-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  max-width:340px;
}

.route-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.route-id{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text-muted);
}

.route-status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:3px 9px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  background:rgba(155,177,164,0.15);
  border:1px solid rgba(155,177,164,0.3);
  color:#9bb1a4;
}

.route-status::before{
  content:"";
  width:6px;
  height:6px;
  border-radius:50%;
  background:currentColor;
}

.route-path{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}

.route-point{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.route-city{
  font-weight:700;
  font-size:14px;
}

.route-time{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-muted);
}

.route-arrow{
  color:var(--brand);
  font-size:18px;
  flex-shrink:0;
}

.route-meta{
  display:flex;
  gap:16px;
  padding-top:12px;
  border-top:1px solid var(--border);
  font-size:11px;
  color:var(--text-muted);
}

.route-meta-item{
  display:flex;
  align-items:center;
  gap:6px;
}

.route-meta-item svg{
  width:13px;
  height:13px;
  stroke:currentColor;
  stroke-width:2;
  fill:none;
}

/* Jauge consommation */
.gauge{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  max-width:280px;
}

.gauge-label{
  font-size:11px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:600;
  margin-bottom:8px;
}

.gauge-value{
  font-family:var(--font-body);
  font-size:28px;
  font-weight:800;
  margin-bottom:4px;
  display:flex;
  align-items:baseline;
  gap:6px;
}

.gauge-unit{
  font-size:14px;
  color:var(--text-muted);
  font-weight:600;
}

.gauge-bar{
  height:8px;
  background:var(--bg-elevated);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:8px;
}

.gauge-fill{
  height:100%;
  background:linear-gradient(90deg,#9bb1a4,rgba(155,177,164,0.6));
  border-radius:4px;
  transition:width 0.3s ease;
}

.gauge-fill.warn{
  background:linear-gradient(90deg,#d4b67a,rgba(212,182,122,0.6));
}

.gauge-fill.alert{
  background:linear-gradient(90deg,var(--brand),rgba(230,57,70,0.6));
}

.gauge-footer{
  font-size:11px;
  color:var(--text-muted);
  display:flex;
  justify-content:space-between;
}

.gauge-change{
  font-weight:600;
}

.gauge-change.up{
  color:var(--success);
}

.gauge-change.down{
  color:var(--brand);
}

/* Timeline compacte */
.timeline-compact{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  max-width:360px;
}

.timeline-compact-header{
  font-size:12px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.timeline-steps{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.timeline-step{
  display:flex;
  gap:10px;
  position:relative;
}

.timeline-step::after{
  content:'';
  position:absolute;
  left:4.5px;
  top:14px;
  width:1px;
  height:calc(100% + 2px);
  background:var(--border);
}

.timeline-step:last-child::after{
  display:none;
}

.timeline-dot-sm{
  width:10px;
  height:10px;
  border-radius:50%;
  margin-top:4px;
  flex-shrink:0;
  position:relative;
  z-index:1;
}

.timeline-dot-sm.done{
  background:var(--success);
}

.timeline-dot-sm.current{
  background:var(--brand);
  box-shadow:0 0 0 3px rgba(230,57,70,0.2);
}

.timeline-dot-sm.pending{
  background:var(--bg-elevated);
  border:2px solid var(--border-strong);
}

.timeline-step-content{
  flex:1;
}

.timeline-step-title{
  font-size:12px;
  font-weight:600;
  margin-bottom:2px;
}

.timeline-step-time{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-muted);
}
</style>
</head>
<body>

<div class="section">
  <div class="section-label">Carte trajet</div>
  <div class="route-card">
    <div class="route-header">
      <div class="route-id">L-2026-0142</div>
      <div class="route-status">Livrée</div>
    </div>
    <div class="route-path">
      <div class="route-point">
        <div class="route-city">Lille</div>
        <div class="route-time">08:30</div>
      </div>
      <div class="route-arrow">→</div>
      <div class="route-point">
        <div class="route-city">Roubaix</div>
        <div class="route-time">09:45</div>
      </div>
    </div>
    <div class="route-meta">
      <div class="route-meta-item">
        <svg viewBox="0 0 24 24"><path d="M5 18H3v-6.6c0-.4.1-.7.3-1L7 5h10l3.7 5.4c.2.3.3.6.3 1V18h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
        Sprinter 314
      </div>
      <div class="route-meta-item">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        18 km
      </div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">Jauge consommation</div>
  <div class="gauge">
    <div class="gauge-label">Consommation 30j</div>
    <div class="gauge-value">
      9,2<span class="gauge-unit">L/100</span>
    </div>
    <div class="gauge-bar">
      <div class="gauge-fill ok" style="width:88%"></div>
    </div>
    <div class="gauge-footer">
      <span>Objectif: 10,0</span>
      <span class="gauge-change up">-8%</span>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">Timeline livraison</div>
  <div class="timeline-compact">
    <div class="timeline-compact-header">Livraison L-2026-0142</div>
    <div class="timeline-steps">
      <div class="timeline-step">
        <div class="timeline-dot-sm done"></div>
        <div class="timeline-step-content">
          <div class="timeline-step-title">Départ entrepôt</div>
          <div class="timeline-step-time">08:30</div>
        </div>
      </div>
      <div class="timeline-step">
        <div class="timeline-dot-sm done"></div>
        <div class="timeline-step-content">
          <div class="timeline-step-title">En transit</div>
          <div class="timeline-step-time">09:15</div>
        </div>
      </div>
      <div class="timeline-step">
        <div class="timeline-dot-sm current"></div>
        <div class="timeline-step-content">
          <div class="timeline-step-title">Arrivée site</div>
          <div class="timeline-step-time">09:45</div>
        </div>
      </div>
      <div class="timeline-step">
        <div class="timeline-dot-sm pending"></div>
        <div class="timeline-step-content">
          <div class="timeline-step-title">Signature client</div>
          <div class="timeline-step-time">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
