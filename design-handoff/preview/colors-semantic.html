<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:var(--bg);color:var(--text);font-family:var(--font-body)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.swatch{flex:1;min-width:130px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,255,255,0.04)}
.meta .name{font-size:12px;font-weight:700;letter-spacing:0.02em}
.meta .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><div class="dot" style="background:#9bb1a4"></div><div class="meta"><div class="name">Livrée</div><div class="hex">#9bb1a4</div></div></div>
  <div class="swatch"><div class="dot" style="background:#d4b67a"></div><div class="meta"><div class="name">En cours</div><div class="hex">#d4b67a</div></div></div>
  <div class="swatch"><div class="dot" style="background:#e63946"></div><div class="meta"><div class="name">Retard</div><div class="hex">#e63946</div></div></div>
  <div class="swatch"><div class="dot" style="background:#6c757d"></div><div class="meta"><div class="name">Brouillon</div><div class="hex">#6c757d</div></div></div>
</div>
</body>
</html>
