<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:var(--bg);color:var(--text);font-family:var(--font-body)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--text-muted)}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.ok{color:#9bb1a4}
.pending{color:#d4b67a}
.late{color:var(--brand);border-color:rgba(230,57,70,0.4);background:rgba(230,57,70,0.08)}
.draft{color:var(--text-muted)}
</style>
</head>
<body>
<div class="row">
  <span class="badge ok">Livrée</span>
  <span class="badge pending">En cours</span>
  <span class="badge late">Retard</span>
  <span class="badge draft">Brouillon</span>
</div>
</body>
</html>
