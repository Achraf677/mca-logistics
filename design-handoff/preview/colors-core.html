<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg)}.row{display:flex;gap:10px;align-items:flex-end}.sw{width:96px;height:96px;border-radius:12px;border:1px solid var(--border);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--text);font-family:var(--font-body);font-size:11px}.sw .name{font-weight:700;font-size:11px;letter-spacing:0.04em}.sw .hex{font-family:var(--font-mono);color:rgba(255,255,255,0.85);font-size:10px}</style></head><body><div class="row"><div class="sw" style="background:#e63946"><div class="name">brand</div><div class="hex">#e63946</div></div><div class="sw" style="background:#ff4d5c"><div class="name">brand-hover</div><div class="hex">#ff4d5c</div></div><div class="sw" style="background:#1a1d22"><div class="name">bg</div><div class="hex">#1a1d22</div></div><div class="sw" style="background:#22262d"><div class="name">elevated</div><div class="hex">#22262d</div></div><div class="sw" style="background:#2a2f37"><div class="name">card</div><div class="hex">#2a2f37</div></div><div class="sw" style="background:#3a4150"><div class="name">border</div><div class="hex">#3a4150</div></div></div></body></html>
