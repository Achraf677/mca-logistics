<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>MCA Logistics - Connexion</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚐</text></svg>" />
  <style>
    :root {
      --bg: #0d1524;
      --border: rgba(139, 157, 184, 0.18);
      --text: #eef3fb;
      --muted: #9aa9bf;
      --accent: #f2a33b;
      --blue: #4c8cf5;
      --danger: #ec5f5f;
      --success: #57c785;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --font: "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(242, 163, 59, 0.18), transparent 30%),
        radial-gradient(circle at 82% 22%, rgba(76, 140, 245, 0.17), transparent 28%),
        linear-gradient(160deg, #08111d 0%, #101a2a 46%, #0b1321 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body.route-leaving .shell {
      opacity: 0;
      transform: translateY(-12px) scale(0.985);
    }

    .shell {
      width: min(620px, 100%);
      display: grid;
      grid-template-columns: 1fr;
      background: linear-gradient(180deg, rgba(9, 15, 26, 0.82), rgba(8, 14, 23, 0.94));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .hero {
      padding: 28px 30px 18px;
      background:
        linear-gradient(145deg, rgba(242, 163, 59, 0.12), transparent 38%),
        linear-gradient(210deg, rgba(76, 140, 245, 0.12), transparent 42%),
        rgba(10, 17, 29, 0.72);
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(242, 163, 59, 0.18);
      background: rgba(242, 163, 59, 0.08);
      color: #ffd49e;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-badge {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(145deg, var(--accent), #f7bc63);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 16px 28px rgba(242, 163, 59, 0.22);
    }

    .brand-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .brand-badge.has-logo img {
      display: block;
    }

    .brand-fallback {
      font-size: 1.7rem;
      color: #131313;
    }

    .brand-badge.has-logo .brand-fallback {
      display: none;
    }

    .brand-name {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.1;
      margin-bottom: 0;
    }

    .auth {
      padding: 26px 30px 30px;
      background: linear-gradient(180deg, rgba(10, 17, 29, 0.84), rgba(10, 17, 29, 0.98));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      width: min(460px, 100%);
    }

    .auth-head {
      margin-bottom: 24px;
    }

    .auth-head h2 {
      font-size: 1.55rem;
      margin-bottom: 0;
    }

    .role-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .role-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: inherit;
    }

    .role-btn strong {
      display: block;
      font-size: 0.94rem;
    }

    .role-btn.active-admin {
      border-color: rgba(242, 163, 59, 0.4);
      background: rgba(242, 163, 59, 0.09);
      box-shadow: inset 0 0 0 1px rgba(242, 163, 59, 0.1);
    }

    .role-btn.active-salarie {
      border-color: rgba(76, 140, 245, 0.36);
      background: rgba(76, 140, 245, 0.1);
      box-shadow: inset 0 0 0 1px rgba(76, 140, 245, 0.1);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(4, 9, 17, 0.66);
      color: var(--text);
      font-size: 0.96rem;
      font-family: inherit;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .field input:focus {
      outline: none;
      border-color: rgba(242, 163, 59, 0.5);
      box-shadow: 0 0 0 4px rgba(242, 163, 59, 0.08);
    }

    .auth.salarie-active .field input:focus {
      border-color: rgba(76, 140, 245, 0.5);
      box-shadow: 0 0 0 4px rgba(76, 140, 245, 0.08);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 48px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.05rem;
      padding: 6px;
      line-height: 1;
    }

    .submit {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
      background: linear-gradient(135deg, var(--accent), #f6b456);
      color: #121212;
      box-shadow: 0 18px 30px rgba(242, 163, 59, 0.2);
    }

    .submit.salarie {
      background: linear-gradient(135deg, var(--blue), #6ba5ff);
      color: #fff;
      box-shadow: 0 18px 30px rgba(76, 140, 245, 0.18);
    }

    .submit:hover {
      transform: translateY(-1px);
    }

    .submit[disabled] {
      opacity: 0.8;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    .submit.is-loading::after {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: spin 0.7s linear infinite;
    }

    .error-msg,
    .status-msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .error-msg.show,
    .status-msg.show {
      display: block;
    }

    .error-msg {
      background: rgba(236, 95, 95, 0.1);
      border: 1px solid rgba(236, 95, 95, 0.22);
      color: #ffb8b8;
    }

    .status-msg {
      background: rgba(87, 199, 133, 0.08);
      border: 1px solid rgba(87, 199, 133, 0.18);
      color: #bcefd0;
    }

    .auth-footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.55;
      text-align: center;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 920px) {
      .shell { width: 100%; }
    }

    @media (max-width: 560px) {
      body { padding: 14px; }
      .hero, .auth { padding: 20px; }
      .role-switch { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Connexion</div>
      <div class="brand">
        <div class="brand-badge" id="brand-badge">
          <img id="brand-logo" alt="Logo entreprise" />
          <span class="brand-fallback">🚐</span>
        </div>
        <div>
          <div class="brand-name">MCA Logistics</div>
        </div>
      </div>

      <h1>Choisissez votre espace et connectez-vous.</h1>
    </section>

    <section class="auth" id="auth-shell">
      <div class="auth-card">
        <div class="auth-head">
          <h2>Connexion</h2>
        </div>

        <div class="role-switch">
          <button type="button" class="role-btn active-admin" id="role-admin-btn" onclick="appliquerRoleConnexion('admin')">
            <strong>Administrateur</strong>
          </button>
          <button type="button" class="role-btn" id="role-salarie-btn" onclick="appliquerRoleConnexion('salarie')">
            <strong>Salarié</strong>
          </button>
        </div>

        <form onsubmit="soumettreConnexion(event)">
          <div class="field">
            <label id="login-identifiant-label" for="login-identifiant">Identifiant administrateur</label>
            <input type="text" id="login-identifiant" autocomplete="username" placeholder="Votre identifiant administrateur" />
          </div>

          <div class="field">
            <label for="login-password">Mot de passe</label>
            <div class="password-wrap">
              <input type="password" id="login-password" autocomplete="current-password" placeholder="Votre mot de passe" />
              <button type="button" class="toggle-password" onclick="toggleMdpVisible('login-password', this)" title="Afficher le mot de passe">👁️</button>
            </div>
          </div>

          <button type="submit" class="submit" id="login-submit">Acceder a l'espace administrateur</button>
          <div class="error-msg" id="login-error"></div>
          <div class="status-msg" id="login-status"></div>
        </form>

        <div class="auth-footer">MCA Logistics v2</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="supabase-auth.js"></script>
  <script>
    let loginEnCours = null;
    let roleConnexionActif = 'admin';
    const LOGIN_FAST_BOOT_KEY = 'delivpro_fast_boot_role';
    const LOGOUT_GUARD_KEY = 'delivpro_logged_out';
    const PENDING_SIGNOUT_KEY = 'delivpro_pending_signout';

    function redirigerAvecTransition(url) {
      document.body.classList.add('route-leaving');
      setTimeout(function() {
        window.location.href = url;
      }, 24);
    }

    function memoriserFastBoot(role) {
      try {
        sessionStorage.setItem(LOGIN_FAST_BOOT_KEY, role || '');
      } catch (_) {}
    }

    function nettoyerGardeLogout() {
      try {
        sessionStorage.removeItem(LOGOUT_GUARD_KEY);
      } catch (_) {}
    }

    function terminerSignOutEnArrierePlan() {
      if (sessionStorage.getItem(PENDING_SIGNOUT_KEY) !== '1') return;
      if (!window.DelivProAuth || !window.DelivProAuth.signOut) {
        sessionStorage.removeItem(PENDING_SIGNOUT_KEY);
        return;
      }
      window.DelivProAuth.signOut().finally(function() {
        sessionStorage.removeItem(PENDING_SIGNOUT_KEY);
      });
    }

    function peutAvoirSessionSupabaseLocale() {
      try {
        for (let i = 0; i < localStorage.length; i += 1) {
          const key = localStorage.key(i) || '';
          if (key.indexOf('sb-') === 0 || key.indexOf('supabase.auth.token') === 0) return true;
        }
      } catch (_) {}
      return false;
    }

    function normaliserNomAdminAffiche(nom, identifiant, email) {
      if (window.DelivProAuth && typeof window.DelivProAuth.normalizeAdminDisplayName === 'function') {
        return window.DelivProAuth.normalizeAdminDisplayName(nom, identifiant, email);
      }
      return nom || identifiant || email || 'Admin';
    }

    function appliquerBrandingLogin() {
      const logo = localStorage.getItem('logo_entreprise') || '';
      const badge = document.getElementById('brand-badge');
      const img = document.getElementById('brand-logo');
      if (badge && img && logo) {
        img.src = logo;
        badge.classList.add('has-logo');
      }
    }

    function getConfigRole(role) {
      if (role === 'salarie') {
        return {
          identifiantLabel: 'Numéro salarié',
          identifiantPlaceholder: 'Votre numéro salarié',
          submitLabel: "Acceder a l'espace salarie",
          submitClass: 'submit salarie'
        };
      }
      return {
        identifiantLabel: 'Identifiant administrateur',
        identifiantPlaceholder: 'Votre identifiant administrateur',
        submitLabel: "Acceder a l'espace administrateur",
        submitClass: 'submit'
      };
    }

    function appliquerRoleConnexion(role) {
      roleConnexionActif = role === 'salarie' ? 'salarie' : 'admin';
      const config = getConfigRole(roleConnexionActif);
      const estSalarie = roleConnexionActif === 'salarie';
      document.getElementById('role-admin-btn').className = 'role-btn' + (estSalarie ? '' : ' active-admin');
      document.getElementById('role-salarie-btn').className = 'role-btn' + (estSalarie ? ' active-salarie' : '');
      document.getElementById('login-identifiant-label').textContent = config.identifiantLabel;
      document.getElementById('login-identifiant').placeholder = config.identifiantPlaceholder;
      document.getElementById('login-submit').className = config.submitClass;
      document.getElementById('login-submit').textContent = config.submitLabel;
      document.getElementById('auth-shell').classList.toggle('salarie-active', estSalarie);
      masquerMessagesConnexion();
      document.getElementById('login-identifiant').focus();
    }

    function toggleMdpVisible(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const visible = input.type === 'password';
      input.type = visible ? 'text' : 'password';
      btn.style.opacity = visible ? '1' : '0.68';
    }

    function masquerMessagesConnexion() {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById('login-status').classList.remove('show');
    }

    function afficherErreurConnexion(message) {
      const el = document.getElementById('login-error');
      el.textContent = message;
      el.classList.add('show');
      document.getElementById('login-status').classList.remove('show');
    }

    function afficherStatutConnexion(message) {
      const el = document.getElementById('login-status');
      el.textContent = message;
      el.classList.add('show');
      document.getElementById('login-error').classList.remove('show');
    }

    function setLoginBusy(busy) {
      const btn = document.getElementById('login-submit');
      btn.disabled = !!busy;
      btn.classList.toggle('is-loading', !!busy);
      if (!busy) loginEnCours = null;
    }

    async function connecterAdmin(identifiant, mdp) {
      if (!window.DelivProAuth || !window.DelivProAuth.signIn) {
        afficherErreurConnexion("Le module d'authentification admin est indisponible.");
        setLoginBusy(false);
        return;
      }

      const authResult = await window.DelivProAuth.signIn('admin', identifiant, mdp);
      if (authResult.ok) {
        sessionStorage.setItem('role', 'admin');
        sessionStorage.setItem('auth_mode', 'supabase');
        sessionStorage.setItem('admin_login', identifiant);
        sessionStorage.setItem('admin_email', authResult.target.email || '');
        sessionStorage.setItem('admin_nom', normaliserNomAdminAffiche(
          authResult.profile?.display_name || authResult.target.display_name || '',
          identifiant,
          authResult.target.email || ''
        ));
        sessionStorage.removeItem('salarie_id');
        sessionStorage.removeItem('salarie_numero');
        memoriserFastBoot('admin');
        localStorage.setItem('last_admin_identifiant', identifiant);
        afficherStatutConnexion('Connexion admin reussie. Redirection en cours...');
        redirigerAvecTransition('admin.html');
        return;
      }

      if (authResult.reason === 'invalid_credentials') {
        afficherErreurConnexion('Identifiant ou mot de passe administrateur incorrect.');
      } else if (authResult.reason === 'not_found') {
        afficherErreurConnexion("Ce compte admin n'est pas configure dans Supabase.");
      } else {
        afficherErreurConnexion("Connexion administrateur Supabase impossible pour le moment.");
      }
      setLoginBusy(false);
    }

    async function connecterSalarie(numero, mdp) {
      if (!window.DelivProAuth || !window.DelivProAuth.signIn) {
        afficherErreurConnexion("Le module d'authentification salarie est indisponible.");
        setLoginBusy(false);
        return;
      }

      const authResult = await window.DelivProAuth.signIn('salarie', numero, mdp);
      if (authResult.ok && authResult.salarie && authResult.salarie.actif !== false) {
        localStorage.removeItem('login_attempts_' + numero);
        sessionStorage.setItem('role', 'salarie');
        sessionStorage.setItem('auth_mode', 'supabase');
        sessionStorage.setItem('salarie_id', authResult.salarie.id || authResult.target.salarie_id || '');
        sessionStorage.setItem('salarie_numero', authResult.salarie.numero || numero);
        sessionStorage.removeItem('admin_login');
        sessionStorage.removeItem('admin_email');
        sessionStorage.removeItem('admin_nom');
        memoriserFastBoot('salarie');
        afficherStatutConnexion('Connexion salarie reussie. Redirection en cours...');
        redirigerAvecTransition('salarie.html');
        return;
      }

      if (authResult.reason === 'invalid_credentials') {
        afficherErreurConnexion('Numero salarie ou mot de passe incorrect.');
      } else if (authResult.reason === 'not_found') {
        afficherErreurConnexion("Aucun acces actif trouve pour ce numero salarie. Demandez a l'administrateur d'activer votre compte.");
      } else if (authResult.reason === 'unavailable') {
        afficherErreurConnexion("La connexion salarie necessite Supabase, actuellement indisponible.");
      } else {
        afficherErreurConnexion("Connexion salarie impossible pour le moment.");
      }
      setLoginBusy(false);
    }

    async function soumettreConnexion(event) {
      if (event) event.preventDefault();
      if (loginEnCours) return;
      loginEnCours = roleConnexionActif;
      setLoginBusy(true);
      masquerMessagesConnexion();

      const identifiant = document.getElementById('login-identifiant').value.trim();
      const mdp = document.getElementById('login-password').value;
      if (!identifiant || !mdp) {
        afficherErreurConnexion('Renseignez votre identifiant et votre mot de passe avant de continuer.');
        setLoginBusy(false);
        return;
      }

      nettoyerGardeLogout();

      if (roleConnexionActif === 'salarie') {
        await connecterSalarie(identifiant.toUpperCase(), mdp);
        return;
      }

      await connecterAdmin(identifiant.toLowerCase(), mdp);
    }

    document.addEventListener('DOMContentLoaded', async function() {
      appliquerBrandingLogin();
      terminerSignOutEnArrierePlan();

      if (sessionStorage.getItem(LOGOUT_GUARD_KEY) === '1') {
        sessionStorage.removeItem(LOGOUT_GUARD_KEY);
        appliquerRoleConnexion('admin');
        return;
      }

      if (window.DelivProAuth && peutAvoirSessionSupabaseLocale()) {
        const restoredRole = window.DelivProAuth.restoreLegacySessionFromSupabase
          ? await window.DelivProAuth.restoreLegacySessionFromSupabase()
          : '';
        if (restoredRole === 'admin') {
          redirigerAvecTransition('admin.html');
          return;
        }
        if (restoredRole === 'salarie') {
          redirigerAvecTransition('salarie.html');
          return;
        }
      }

      appliquerRoleConnexion('admin');
    });
  </script>
</body>
</html>
