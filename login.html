<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCA Logistics â€” Connexion</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ðŸš</text></svg>" />
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #f5a623;
      --accent-dark: #d4911d;
      --blue: #3498db;
      --blue-dark: #2575a7;
      --border: #2a2d3d;
      --text: #e8eaf0;
      --muted: #7c8299;
      --red: #e74c3c;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(245,166,35,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 72% 20%, rgba(52,152,219,0.05) 0%, transparent 52%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.4s ease;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo .icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .login-logo .name {
      font-size: 1.85rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .login-logo .sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .login-card h2 {
      font-size: 1.12rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 22px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-btn {
      border: 1px solid var(--border);
      background: #11141d;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      font-family: var(--font);
    }

    .mode-btn strong {
      display: block;
      font-size: 0.93rem;
      margin-bottom: 4px;
    }

    .mode-btn span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .mode-btn.active-admin {
      border-color: rgba(245,166,35,0.5);
      background: rgba(245,166,35,0.08);
      box-shadow: 0 0 0 1px rgba(245,166,35,0.15) inset;
    }

    .mode-btn.active-salarie {
      border-color: rgba(52,152,219,0.45);
      background: rgba(52,152,219,0.08);
      box-shadow: 0 0 0 1px rgba(52,152,219,0.14) inset;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .panel-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .panel-badge.admin {
      background: rgba(245,166,35,0.08);
      color: var(--accent);
      border-color: rgba(245,166,35,0.18);
    }

    .panel-badge.salarie {
      background: rgba(52,152,219,0.08);
      color: var(--blue);
      border-color: rgba(52,152,219,0.18);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .form-group input {
      background: #0f1117;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: var(--font);
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .panel.salarie-panel .form-group input:focus {
      border-color: var(--blue);
    }

    .form-group input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 13px;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: var(--font);
      letter-spacing: 0.5px;
    }

    .btn-login.admin {
      background: var(--accent);
    }

    .btn-login.admin:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,166,35,0.3);
    }

    .btn-login.salarie {
      background: var(--blue);
      color: #fff;
    }

    .btn-login.salarie:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(52,152,219,0.28);
    }

    .error-msg {
      display: none;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 14px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .login-card {
        padding: 24px 18px;
      }

      .mode-switch {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="icon">ðŸš</span>
      <div class="name">MCA Logistics</div>
      <div class="sub">Choisissez votre espace de connexion</div>
    </div>

    <div class="login-card">
      <h2>Connexion</h2>
      <div class="login-subtitle">AccÃ¨s unique pour l'administration et les salariÃ©s</div>

      <div class="mode-switch">
        <button id="btn-mode-admin" class="mode-btn active-admin" type="button" onclick="basculerMode('admin')">
          <strong>Administrateur</strong>
          <span>Gestion complÃ¨te de l'interface admin</span>
        </button>
        <button id="btn-mode-salarie" class="mode-btn" type="button" onclick="basculerMode('salarie')">
          <strong>SalariÃ©</strong>
          <span>AccÃ¨s personnel, planning, km, carburant, inspection</span>
        </button>
      </div>

      <div id="panel-admin" class="panel admin-panel active">
        <div class="panel-badge admin">ðŸ” Connexion administrateur</div>

        <div class="form-group">
          <label>Identifiant administrateur</label>
          <input type="text" id="input-identifiant" autocomplete="username" onkeydown="if(event.key==='Enter') seConnecterAdmin()" />
        </div>

        <div class="form-group">
          <label>Mot de passe administrateur</label>
          <div style="position:relative">
            <input type="password" id="input-mdp" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" autocomplete="current-password" onkeydown="if(event.key==='Enter') seConnecterAdmin()" style="padding-right:44px;width:100%"/>
            <button onclick="toggleMdpVisible('input-mdp', this)" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:4px;line-height:1" title="Afficher le mot de passe">ðŸ‘ï¸</button>
          </div>
        </div>

        <button class="btn-login admin" onclick="seConnecterAdmin()">Se connecter en admin â†’</button>
        <div class="error-msg" id="error-admin">âŒ Identifiants incorrects</div>
      </div>

      <div id="panel-salarie" class="panel salarie-panel">
        <div class="panel-badge salarie">ðŸ‘· Connexion salariÃ©</div>

        <div class="form-group">
          <label>NumÃ©ro salariÃ©</label>
          <input type="text" id="login-numero" placeholder="Ex : EMP001" autocomplete="username" onkeydown="if(event.key==='Enter') seConnecterSalarie()" />
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <div style="position:relative">
            <input type="password" id="login-mdp" placeholder="Votre mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter') seConnecterSalarie()" style="padding-right:44px;width:100%"/>
            <button onclick="toggleMdpVisible('login-mdp', this)" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:4px;line-height:1" title="Afficher le mot de passe">ðŸ‘ï¸</button>
          </div>
        </div>

        <button class="btn-login salarie" onclick="seConnecterSalarie()">Se connecter en salariÃ© â†’</button>
        <div class="error-msg" id="error-salarie">âŒ NumÃ©ro ou mot de passe incorrect</div>
      </div>
    </div>

    <div class="login-footer">MCA Logistics v2 â€” Gestion interne</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="supabase-auth.js"></script>
  <script>
    function basculerMode(mode) {
      const estAdmin = mode === 'admin';
      document.getElementById('panel-admin').classList.toggle('active', estAdmin);
      document.getElementById('panel-salarie').classList.toggle('active', !estAdmin);
      document.getElementById('btn-mode-admin').className = 'mode-btn' + (estAdmin ? ' active-admin' : '');
      document.getElementById('btn-mode-salarie').className = 'mode-btn' + (!estAdmin ? ' active-salarie' : '');

      document.getElementById('error-admin').classList.remove('show');
      document.getElementById('error-salarie').classList.remove('show');

      if (estAdmin) {
        document.getElementById('input-identifiant').focus();
      } else {
        document.getElementById('login-numero').focus();
      }
    }

    function toggleMdpVisible(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;
      if (input.type === 'password') {
        input.type = 'text';
        btn.style.opacity = '1';
      } else {
        input.type = 'password';
        btn.style.opacity = '0.6';
      }
    }

    async function seConnecterAdmin() {
      const identifiant = document.getElementById('input-identifiant').value.trim().toLowerCase();
      const mdp = document.getElementById('input-mdp').value.trim();
      const errEl = document.getElementById('error-admin');
      errEl.classList.remove('show');

      if (!identifiant || !mdp) {
        errEl.textContent = 'âŒ Veuillez saisir votre identifiant et votre mot de passe';
        errEl.classList.add('show');
        return;
      }

      if (window.DelivProAuth && window.DelivProAuth.signIn) {
        const authResult = await window.DelivProAuth.signIn('admin', identifiant, mdp);
        if (authResult.ok) {
          sessionStorage.setItem('role', 'admin');
          sessionStorage.setItem('admin_login', authResult.target.email || identifiant);
          sessionStorage.setItem('admin_nom', authResult.profile?.display_name || authResult.target.display_name || 'Admin');
          sessionStorage.removeItem('salarie_id');
          sessionStorage.removeItem('salarie_numero');
          window.location.href = 'admin.html';
          return;
        }
      }
      errEl.textContent = 'Identifiant ou mot de passe administrateur Supabase incorrect';
      errEl.classList.add('show');
    }

    async function seConnecterSalarie() {
      const numero = document.getElementById('login-numero').value.trim().toUpperCase();
      const mdp = document.getElementById('login-mdp').value;
      const errEl = document.getElementById('error-salarie');
      errEl.classList.remove('show');

      if (!numero || !mdp) {
        errEl.textContent = 'âŒ Veuillez saisir votre numÃ©ro salariÃ© et votre mot de passe';
        errEl.classList.add('show');
        return;
      }

      const cle = 'login_attempts_' + numero;
      const attempts = JSON.parse(localStorage.getItem(cle) || '{"count":0,"time":0}');
      const maxTent = parseInt(localStorage.getItem('max_tentatives') || '5', 10);
      const delaiMin = 15;

      if (attempts.count >= maxTent) {
        const elapsed = (Date.now() - attempts.time) / 60000;
        if (elapsed < delaiMin) {
          const restant = Math.ceil(delaiMin - elapsed);
          errEl.textContent = 'âŒ Compte temporairement bloquÃ©. RÃ©essayez dans ' + restant + ' min.';
          errEl.classList.add('show');
          return;
        }
        localStorage.removeItem(cle);
      }

      if (window.DelivProAuth && window.DelivProAuth.signIn) {
        const authResult = await window.DelivProAuth.signIn('salarie', numero, mdp);
        if (authResult.ok && authResult.salarie && authResult.salarie.actif !== false) {
          localStorage.removeItem(cle);
          sessionStorage.setItem('role', 'salarie');
          sessionStorage.setItem('salarie_id', authResult.salarie.id || authResult.target.salarie_id || '');
          sessionStorage.setItem('salarie_numero', authResult.salarie.numero || numero);
          sessionStorage.removeItem('admin_login');
          sessionStorage.removeItem('admin_nom');
          window.location.href = 'salarie.html';
          return;
        }
      }

      const salaries = JSON.parse(localStorage.getItem('salaries') || '[]');
      const sal = salaries.find(function (s) {
        return s.numero === numero && s.mdpHash === btoa(mdp);
      });

      if (!sal) {
        const att = JSON.parse(localStorage.getItem(cle) || '{"count":0,"time":0}');
        att.count += 1;
        att.time = Date.now();
        localStorage.setItem(cle, JSON.stringify(att));
        const restantes = Math.max(0, maxTent - att.count);
        errEl.textContent = restantes > 0
          ? 'âŒ NumÃ©ro ou mot de passe incorrect. (' + restantes + ' tentative' + (restantes > 1 ? 's' : '') + ' restante' + (restantes > 1 ? 's' : '') + ')'
          : 'âŒ Compte bloquÃ© 15 minutes aprÃ¨s trop de tentatives.';
        errEl.classList.add('show');
        return;
      }

      if (!sal.actif) {
        errEl.textContent = 'âŒ Compte dÃ©sactivÃ©. Contactez lâ€™administrateur.';
        errEl.classList.add('show');
        return;
      }

      localStorage.removeItem(cle);
      sessionStorage.setItem('role', 'salarie');
      sessionStorage.setItem('salarie_id', sal.id);
      sessionStorage.setItem('salarie_numero', sal.numero);
      sessionStorage.removeItem('admin_login');
      sessionStorage.removeItem('admin_nom');
      window.location.href = 'salarie.html';
    }

    document.addEventListener('DOMContentLoaded', async function () {
      if (window.DelivProAuth) {
        if (await window.DelivProAuth.ensureAdminLegacySessionFromSupabase()) {
          window.location.href = 'admin.html';
          return;
        }
        if (await window.DelivProAuth.ensureSalarieLegacySessionFromSupabase()) {
          window.location.href = 'salarie.html';
          return;
        }
      }
      basculerMode('admin');
    });
  </script>
</body>
</html>
