<!-- _skeleton.html — Placeholders loading -->
<!-- Variant : line / rect / circle / row table / kpi card -->

<!-- Line (texte chargé) -->
<div class="skeleton skeleton-bar" style="height:14px;width:80%"></div>
<div class="skeleton skeleton-bar" style="height:14px;width:60%"></div>

<!-- Rect (card placeholder) -->
<div class="skeleton skeleton-card"></div>

<!-- Circle (avatar placeholder) -->
<div class="skeleton" style="width:40px;height:40px;border-radius:50%"></div>

<!-- Row table (5 colonnes) -->
<tr>
  <td><div class="skeleton skeleton-bar" style="height:12px;width:70%"></div></td>
  <td><div class="skeleton skeleton-bar" style="height:12px;width:90%"></div></td>
  <td><div class="skeleton skeleton-bar" style="height:12px;width:60%"></div></td>
  <td><div class="skeleton skeleton-bar" style="height:12px;width:80%"></div></td>
  <td><div class="skeleton skeleton-bar" style="height:12px;width:50%"></div></td>
</tr>

<!-- KPI card placeholder -->
<div class="kpi-card">
  <div class="skeleton skeleton-bar" style="height:11px;width:50%;margin-bottom:8px"></div>
  <div class="skeleton skeleton-bar" style="height:22px;width:70%"></div>
</div>
