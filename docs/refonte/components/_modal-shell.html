<!-- _modal-shell.html — Coque de modale DS canonique -->
<!-- Tailles : sm (max-width 380), md (520, default), lg (720), xl (960), fullscreen
     Garder l'ID modal-* d'origine pour le JS prod (closeModal/openModal).
     data-modal-size optionnel. -->
<div class="modal-overlay" id="ID_PRESERVE" data-modal-size="md">
  <div class="modal">
    <div class="modal-header">
      <h3>Titre de la modale</h3>
      <button class="modal-close" aria-label="Fermer" onclick="closeModal('ID_PRESERVE')">✕</button>
    </div>
    <div class="modal-body">
      <!-- Contenu form ou texte ici -->
      <div class="form-group">
        <label>Champ exemple</label>
        <input type="text" placeholder="Saisir..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('ID_PRESERVE')">Annuler</button>
      <button class="btn-primary" onclick="confirmAction()">✅ Confirmer</button>
    </div>
  </div>
</div>
