<!-- _kpi-card.html — Composant générique KPI card -->
<!-- Usage : copier le markup, remplacer ID_PRESERVE par l'ID réel.
     Variantes : data-tone="neutral|green|orange|red|blue", data-size="sm|md|lg" -->
<div class="kpi-card" data-tone="neutral">
  <div class="kpi-label">CA HT</div>
  <div class="kpi-value" id="ID_PRESERVE">38 420 €</div>
  <div class="kpi-sub"><span class="up">+8%</span> vs mois N-1</div>
</div>

<!-- Variant green -->
<div class="kpi-card green">
  <div class="kpi-label">Marge nette</div>
  <div class="kpi-value">11 280 €</div>
  <div class="kpi-sub">29,4%</div>
</div>

<!-- Variant red (alerte) -->
<div class="kpi-card red">
  <div class="kpi-label">Retards</div>
  <div class="kpi-value">3</div>
  <div class="kpi-sub"><span class="down">+1</span></div>
</div>
