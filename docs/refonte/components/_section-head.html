<!-- _section-head.html — Header de page DS canonique -->
<!-- Avec/sans breadcrumb, avec/sans description, avec/sans actions -->

<!-- Variant simple : titre + sous-titre + actions -->
<div class="section-head">
  <div>
    <h2>Vue d'ensemble</h2>
    <div class="sub">Performance opérationnelle du mois en cours</div>
  </div>
  <div class="actions">
    <button class="btn-secondary">📥 Export CSV</button>
    <button class="btn-primary">+ Nouvelle livraison</button>
  </div>
</div>

<!-- Variant avec breadcrumb -->
<div class="section-head">
  <div>
    <nav aria-label="Breadcrumb" style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">
      <a href="#dashboard" style="color:inherit;text-decoration:none">Dashboard</a>
      <span style="margin:0 6px">›</span>
      <span>Livraisons</span>
    </nav>
    <h2>Livraisons</h2>
    <div class="sub">142 livraisons ce mois · 3 en retard</div>
  </div>
  <div class="actions">
    <button class="btn-primary">+ Nouvelle livraison</button>
  </div>
</div>

<!-- Variant minimal (titre seul) -->
<div class="section-head">
  <h2>Paramètres</h2>
</div>
