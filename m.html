  <style>
    /* Refonte mobile pixel-pret — SVG icons + brand + polish */
    .m-header-brand{display:flex;align-items:center;gap:8px;padding-right:8px}
    .m-header-brand-logo{width:28px;height:20px;flex-shrink:0}
    .m-header-brand-text{font-family:var(--font-display,"Syne",sans-serif);font-weight:800;font-size:12px;letter-spacing:-0.02em;line-height:1;display:none}
    @media(min-width:380px){.m-header-brand-text{display:block}}
    .m-header-brand-text .red{color:var(--ds-brand,#e63946);font-style:italic;font-weight:700;font-size:9px;display:block;margin-top:1px;letter-spacing:0.06em}

    /* SVG icons in bottom nav + drawer */
    .m-tab-icon svg,.m-drawer-link svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .m-drawer-link svg{width:18px;height:18px;flex-shrink:0;opacity:0.85}
    .m-header-action svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* Top brand bar accent (red gradient under header) */
    .m-header{position:relative}
    .m-header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--ds-brand,#e63946) 0%,transparent 50%);pointer-events:none}

    /* Phase 91.74 : Skip link a11y WCAG 2.4.1 */
    .a11y-skip-link{position:absolute;top:-100px;left:8px;z-index:10000;padding:10px 16px;background:var(--ds-brand,#e63946);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:.9rem;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:top .15s ease-out}
    .a11y-skip-link:focus{top:8px;outline:2px solid #fff;outline-offset:2px}
  </style>
</head>
<body class="m-app m-theme-dark">

  <!-- ========================================================================
       MCA LOGISTICS — m.html — Plan du fichier (app chauffeur mobile)
       ========================================================================
       Shell léger (sans pages internes — le main #m-content est SWAPÉ par JS) :

       1. <header class="m-header">     ~ligne 39  : brand + back + titre + IA
       2. <main #m-content>             ~ligne 66  : conteneur unique, contenu
                                                     injecté par script-mobile.js
                                                     selon la route active
       3. <aside #m-drawer>             ~ligne 100 : drawer latéral (menu nav)
       4. <aside #m-sheet>              ~ligne 216 : bottom sheet (modales mobile)
       5. Toasts, dialogs, FAB Agent IA, bottom nav

       Sacred IDs (NE PAS RENOMMER) :
         #m-content, #m-back-btn, #m-title, #m-chatbot-btn, #m-agent-ia-btn,
         #m-agent-ia-badge, #m-bottom-nav, #m-drawer*, #m-sheet*, #m-toast.

       script-mobile.js (12k lignes) hydrate #m-content à chaque route change.
       ======================================================================== -->

  <!-- Phase 91.74 : Skip link a11y WCAG 2.4.1 -->
  <a href="#m-content" class="a11y-skip-link">Aller au contenu principal</a>

  <script>
    // Cable le bouton bug-report du drawer mobile (m.html). Listener delegue document-level
    // pour survivre a un re-render du drawer.
    document.addEventListener('click', function (e) {
      var btn = e.target && e.target.closest && e.target.closest('#m-bug-report-btn');
      if (!btn) return;
      e.preventDefault();
      if (window.BugReport && typeof window.BugReport.open === 'function') {
        var drawer = document.getElementById('m-drawer');
        if (drawer) drawer.setAttribute('aria-hidden', 'true');
        var overlay = document.getElementById('m-drawer-overlay');
        if (overlay) overlay.hidden = true;
        window.BugReport.open();
      }
    });
  </script>
</body>
</html>
